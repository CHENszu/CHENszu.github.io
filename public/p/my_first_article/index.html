<script>
    (function() {
        const darkModeText = document.getElementById('dark-mode-text');
        if (darkModeText) {
            const updateText = (scheme) => {
                if (scheme === 'dark') {
                    darkModeText.textContent = '浅色模式';
                } else {
                    darkModeText.textContent = '深色模式';
                }
            };

            window.addEventListener('onColorSchemeChange', (e) => {
                updateText(e.detail);
            });

            
            const currentScheme = document.documentElement.dataset.scheme;
            if (currentScheme) {
                updateText(currentScheme);
            }
        }
    })();
</script>
