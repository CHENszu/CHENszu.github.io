# params.yaml
# --- 核心内容配置 ---
mainSections:
  - post           # 首页列表中显示哪个目录下的内容（通常是 post）
featuredImageField: image # 文章封面图片的 Front Matter 字段名
rssFullContent: true      # RSS 是否输出全文（建议开启，方便读者订阅）
favicon: favicon.png     # 网站图标 (需存放在 assets/favicon.png)

# --- 页脚信息 ---
footer:
  since: 2026      # 建站年份
  customText: "<span id=\"busuanzi_container_site_pv\">本站总访问量 <span id=\"busuanzi_value_site_pv\"></span> 次</span><br><span id=\"busuanzi_container_site_uv\">本站总访客数 <span id=\"busuanzi_value_site_uv\"></span> 人</span>"

# --- 日期格式化 ---
dateFormat:
  published: "2006-01-02"      # 发布日期格式 (例如 2024-01-28)
  lastUpdated: "2006-01-02 15:04" # 更新日期格式

# --- 侧边栏 ---
sidebar:
  subtitle: "小v小v，我要吃附近最好吃的外卖！" # 头像下方的副标题
  avatar: img/avatar.png # 头像路径 (需存放在 assets/img/avatar.png)

# --- 文章页面 ---
article:
  math: false          # 是否启用数学公式 (KaTeX/MathJax)
  toc: true            # 是否显示目录
  readingTime: true    # 显示预计阅读时间
  wordCount: true      # 显示字数统计
  license:
    enabled: true
    default: "CC BY-NC-SA 4.0" # 默认版权协议

# --- 侧边栏小部件 ---
widgets:
  homepage:            # 首页显示的部件
    - type: search     # 搜索框
    - type: archives   # 归档
      params:
        limit: 5
    - type: categories # 分类
      params:
        limit: 10
    - type: tag-cloud  # 标签云
      params:
        limit: 10
  page:                # 文章页显示的部件
    - type: toc        # 目录 (Table of Contents)

# --- 个性化设置 ---
colorScheme:
  toggle: true     # 显示深色/浅色模式切换按钮
  default: auto    # 默认模式 (auto/light/dark)

imageProcessing:
  cover:
    enabled: true  # 启用封面图自动处理
  content:
    enabled: true  # 启用正文图片自动处理

# --- 评论系统 ---
comments:
  enabled: true
  provider: "giscus"  # 推荐使用 giscus，基于 GitHub Discussions，免费且无广告

  # Giscus 配置（请前往 https://giscus.app/zh-CN 获取以下对应的值）
  giscus:
    repo: "CHENszu/CHENszu.github.io"             # 填入你的仓库，例如 "chenszu/myblog"
    repoID: "R_kgDORgl9Mw"                           # 你的仓库 ID (在 giscus 官网获取)
    category: "Announcements"            # 讨论分类 (在 giscus 官网获取)
    categoryID: "DIC_kwDORgl9M84Cllc_"                       # 分类 ID (在 giscus 官网获取)
    mapping: "pathname"
    lightTheme: "light"
    darkTheme: "dark_dimmed"
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: "top"
    lang: "zh-CN"
    loading: "lazy"
